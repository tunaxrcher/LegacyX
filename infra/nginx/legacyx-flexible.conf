# LegacyX Nginx reverse proxy — HTTP-only variant for Cloudflare Flexible.
#
# Use this when the Cloudflare zone runs in **Flexible** SSL mode and you
# can't (or don't want to) elevate just these hostnames to Full (strict):
#
#   User --HTTPS--> Cloudflare --HTTP (plaintext!)--> Droplet (this nginx)
#
# ⚠️ SECURITY — traffic between Cloudflare and the droplet is NOT encrypted.
#    Acceptable for staging / smoke testing. NOT recommended for production
#    with real PII. For prod, switch to `legacyx.conf` (Origin Cert + Full
#    strict).
#
# Install:
#   sudo cp infra/nginx/legacyx-flexible.conf /etc/nginx/sites-available/legacyx
#   sudo ln -sf /etc/nginx/sites-available/legacyx /etc/nginx/sites-enabled/legacyx
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ---------------------------------------------------------------------------
# Trust Cloudflare's proxy: replace $remote_addr with the real client IP.
# IP list from https://www.cloudflare.com/ips/ (refresh ~quarterly).
# ---------------------------------------------------------------------------
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# Rate-limit zone for OTP endpoints (60 req/min/IP).
limit_req_zone $binary_remote_addr zone=otp:10m rate=60r/m;

# ---------------------------------------------------------------------------
# Backoffice (staff UI)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name app-legacyx.unityx.group;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# API server
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name api-legacyx.unityx.group;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 25M;

    # OTP request + verify — extra-strict rate limit
    location ~ ^/api/v1/(auth/phone|patient/auth) {
        limit_req         zone=otp burst=20 nodelay;
        proxy_pass        http://127.0.0.1:3001;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto https;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# Patient app (LIFF/PWA)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name m-legacyx.unityx.group;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# Reject anything that isn't one of the three subdomains above (e.g. direct
# droplet-IP probes).
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
