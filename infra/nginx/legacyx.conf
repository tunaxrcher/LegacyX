# LegacyX Nginx reverse proxy — DigitalOcean Droplet
#
# Maps three public domains to the locally-bound docker containers:
#   app-legacyx.unityx.group → 127.0.0.1:3003   (backoffice)
#   api-legacyx.unityx.group → 127.0.0.1:3001   (api-server)
#   m-legacyx.unityx.group   → 127.0.0.1:3004   (patient-app)
#
# Install on the droplet:
#   sudo cp infra/nginx/legacyx.conf /etc/nginx/sites-available/legacyx
#   sudo ln -sf /etc/nginx/sites-available/legacyx /etc/nginx/sites-enabled/legacyx
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain TLS certificates:
#   sudo certbot --nginx \
#     -d app-legacyx.unityx.group \
#     -d api-legacyx.unityx.group \
#     -d m-legacyx.unityx.group \
#     --agree-tos -m admin@unityx.group --no-eff-email
#
# Certbot will rewrite the `listen 443 ssl` blocks below in place — that's fine.

# Rate-limit zone for OTP endpoints (60 req/min/IP, ref docs/PRODUCTION_HARDENING.md §6).
limit_req_zone $binary_remote_addr zone=otp:10m rate=60r/m;

# ---------------------------------------------------------------------------
# Backoffice (staff UI)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name app-legacyx.unityx.group;

    ssl_certificate     /etc/letsencrypt/live/app-legacyx.unityx.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-legacyx.unityx.group/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# API server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name api-legacyx.unityx.group;

    ssl_certificate     /etc/letsencrypt/live/api-legacyx.unityx.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-legacyx.unityx.group/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 25M;

    # OTP request + verify — extra-strict rate limit
    location ~ ^/api/v1/(auth/phone|patient/auth) {
        limit_req         zone=otp burst=20 nodelay;
        proxy_pass        http://127.0.0.1:3001;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto https;
    }

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# Patient app (LIFF/PWA)
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name m-legacyx.unityx.group;

    ssl_certificate     /etc/letsencrypt/live/m-legacyx.unityx.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/m-legacyx.unityx.group/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name
        app-legacyx.unityx.group
        api-legacyx.unityx.group
        m-legacyx.unityx.group;

    return 301 https://$host$request_uri;
}
