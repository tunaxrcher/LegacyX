name: legacyx-prod

# Production-grade docker-compose for the Clinic Management System.
# Build context is the repo root (../../ from this file). Volumes are named so
# they survive `docker compose down`. All services join a private network
# `legacyx-net`. Secrets are passed via env-file (`.env.prod`, not committed).
#
# Usage:
#   cp .env.prod.example .env.prod   # edit values
#   docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d --build

x-app-defaults: &app-defaults
  restart: unless-stopped
  networks:
    - legacyx-net
  env_file:
    - ../../.env.prod
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  mysql:
    image: mysql:8.0
    container_name: legacyx-mysql
    <<: *app-defaults
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=300
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-legacyx}
      TZ: Asia/Bangkok
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: legacyx-redis
    <<: *app-defaults
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: legacyx-minio
    <<: *app-defaults
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    image: legacyx/api-server:${IMAGE_TAG:-latest}
    container_name: legacyx-api
    <<: *app-defaults
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api-server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker-engine:
    image: legacyx/worker-engine:${IMAGE_TAG:-latest}
    container_name: legacyx-worker
    <<: *app-defaults
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker-engine
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WORKER_METRICS_PORT:-9464}:9464"

  ai-service:
    image: legacyx/ai-service:${IMAGE_TAG:-latest}
    container_name: legacyx-ai
    <<: *app-defaults
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.ai-service
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${AI_PORT:-3002}:3002"

  backoffice-web:
    image: legacyx/backoffice-web:${IMAGE_TAG:-latest}
    container_name: legacyx-backoffice
    <<: *app-defaults
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.backoffice-web
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "${BACKOFFICE_PORT:-3003}:3003"

  patient-app:
    image: legacyx/patient-app:${IMAGE_TAG:-latest}
    container_name: legacyx-patient
    <<: *app-defaults
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.patient-app
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "${PATIENT_PORT:-3004}:3004"

networks:
  legacyx-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
