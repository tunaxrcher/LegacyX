name: legacyx

services:
  mysql:
    image: mysql:8.0
    container_name: legacyx-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=300
    environment:
      MYSQL_ROOT_PASSWORD: mypassword
      MYSQL_DATABASE: demo
      TZ: Asia/Bangkok
    ports:
      - "9251:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmypassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: legacyx-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "9152:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: legacyx-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: legacyx
      MINIO_ROOT_PASSWORD: legacyx-secret
    ports:
      - "9153:9000"
      - "9154:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: legacyx-mailhog
    restart: unless-stopped
    ports:
      - "9155:1025"
      - "9156:8025"

volumes:
  mysql_data:
  redis_data:
  minio_data:
